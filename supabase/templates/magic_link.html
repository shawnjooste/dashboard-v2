<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 440px; margin: 0 auto; padding: 32px 24px;">
  <h2 style="margin: 0 0 8px; font-size: 20px; color: #111;">Your Rocking sign-in code</h2>
  <p style="color: #444; font-size: 14px; line-height: 1.5; margin: 0 0 20px;">
    Enter this 6-digit code to sign in. It expires shortly and can only be used once.
  </p>
  <div style="font-size: 34px; font-weight: 700; letter-spacing: 10px; background: #f4f4f5; border-radius: 10px; padding: 18px 0; text-align: center; color: #111;">
    {{ .Token }}
  </div>
  <p style="color: #999; font-size: 12px; line-height: 1.5; margin: 20px 0 0;">
    If you didn't request this, you can safely ignore this email.
  </p>
</div>
